name: 毎朝Todoをカレンダーに登録＆ダッシュボード更新

on:
  schedule:
    # 毎朝2:00 JST = UTC 17:00（前日）
    # ※ GitHub Actionsは混雑時に1〜2時間遅延するため、6時確認に間に合うよう早めに設定
    - cron: "0 17 * * *"
  workflow_dispatch:  # 手動実行ボタン（テスト用）

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write  # GitHub Pagesへのプッシュに必要

jobs:
  schedule-todos:
    runs-on: ubuntu-latest
    steps:
      - name: コードをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.12 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: カレンダーにTodoを登録
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python scheduler.py
        continue-on-error: true  # カレンダー登録が失敗しても後続処理を継続

      - name: ダッシュボードHTMLを生成
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python generate_dashboard.py

      - name: GitHub Pagesにデプロイ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "chore: ダッシュボード更新 $(TZ=Asia/Tokyo date +'%Y-%m-%d %H:%M JST')"
          git push
